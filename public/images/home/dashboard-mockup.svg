<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-label="BIE Dashboard — ecosistema de agentes IA en operación">

  <!-- Browser shell -->
  <rect width="900" height="560" rx="10" fill="#0f172a"/>
  <rect width="900" height="38" rx="10" fill="#1e293b"/>
  <rect y="28" width="900" height="10" fill="#1e293b"/>

  <!-- Browser controls -->
