  <text x="590" y="153" font-family="Arial,sans-serif" font-size="9" fill="#c4972a">24/7</text>
  <text x="544" y="170" font-family="Arial,sans-serif" font-size="8" fill="#475569">0 errores en las últimas 24h</text>

