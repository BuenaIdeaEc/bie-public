  <text x="250" y="515" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">312</text>

  <rect x="330" y="450" width="60" height="50" rx="3" fill="#2e75b6" opacity="0.7"/>
  <text x="360" y="444" font-family="Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Web chat</text>
  <text x="360" y="515" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">201</text>

  <rect x="440" y="465" width="60" height="35" rx="3" fill="#c4972a" opacity="0.8"/>
  <text x="470" y="459" font-family="Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Email</text>
  <text x="470" y="515" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">98</text>

  <rect x="550" y="475" width="60" height="25" rx="3" fill="#2e75b6" opacity="0.5"/>
  <text x="580" y="469" font-family="Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Instagram</text>
  <text x="580" y="515" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">54</text>

  <rect x="660" y="480" width="60" height="20" rx="3" fill="#2e75b6" opacity="0.4"/>
  <text x="690" y="474" font-family="Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Llamadas</text>
  <text x="690" y="515" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="600">31</text>

  <!-- Horizontal baseline -->
  <line x1="200" y1="500" x2="860" y2="500" stroke="#334155" stroke-width="0.5"/>

  <!-- Gold accent glow top-right -->
