  <rect x="602" y="284" width="252" height="26" rx="4" fill="#0f1629" opacity="0.5"/>
  <circle cx="616" cy="297" r="4" fill="#22c55e"/>
  <text x="628" y="301" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Agente Datos / CRM</text>
  <text x="750" y="301" font-family="Arial,sans-serif" font-size="8" fill="#64748b">12 sincronizaciones</text>
  <text x="835" y="301" font-family="Arial,sans-serif" font-size="8" fill="#22c55e">●</text>

  <rect x="602" y="316" width="252" height="26" rx="4" fill="#0f1629" opacity="0.5"/>
  <circle cx="616" cy="329" r="4" fill="#c4972a"/>
  <text x="628" y="333" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Agente Email / Marketing</text>
  <text x="750" y="333" font-family="Arial,sans-serif" font-size="8" fill="#64748b">standby</text>
  <text x="835" y="333" font-family="Arial,sans-serif" font-size="8" fill="#c4972a">●</text>

  <rect x="602" y="348" width="252" height="26" rx="4" fill="#0f1629" opacity="0.5"/>
  <circle cx="616" cy="361" r="4" fill="#22c55e"/>
  <text x="628" y="365" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Agente Calificador Leads</text>
  <text x="750" y="365" font-family="Arial,sans-serif" font-size="8" fill="#64748b">activo · web + WA</text>
  <text x="835" y="365" font-family="Arial,sans-serif" font-size="8" fill="#22c55e">●</text>

