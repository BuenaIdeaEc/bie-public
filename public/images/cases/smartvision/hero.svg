<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <pattern id="grid-sv" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg-sv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0f1f0f"/>
    </linearGradient>
    <radialGradient id="glow-sv" cx="30%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#2E75B6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg-sv)"/>
  <rect width="1200" height="675" fill="url(#glow-sv)"/>
  <rect width="1200" height="675" fill="url(#grid-sv)"/>
  <!-- Decorative squares -->
  <rect x="80" y="60" width="100" height="100" fill="none" stroke="rgba(46,117,182,0.25)" stroke-width="1"/>
  <rect x="100" y="80" width="60" height="60" fill="rgba(46,117,182,0.08)"/>
  <!-- Status badge -->
  <rect x="80" y="380" width="140" height="30" rx="2" fill="rgba(196,151,42,0.15)" stroke="rgba(196,151,42,0.4)" stroke-width="1"/>
  <text x="103" y="400" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="rgba(196,151,42,0.9)" letter-spacing="2">EN DESARROLLO</text>
  <!-- Text -->
  <text x="80" y="450" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="rgba(46,117,182,0.7)" letter-spacing="4">ÓPTICA · ECUADOR</text>
  <text x="80" y="520" font-family="Arial,sans-serif" font-weight="700" font-size="56" fill="white" letter-spacing="-2" opacity="0.9">SmartVision</text>
  <text x="80" y="565" font-family="Arial,sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.45)">Gestión integral con IA · Calificación automática</text>
  <!-- Bottom accent -->
  <rect x="80" y="600" width="160" height="2" fill="#2E75B6" opacity="0.5"/>
  <text x="1000" y="640" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="80" fill="rgba(255,255,255,0.03)" letter-spacing="-4">BIE</text>
</svg>