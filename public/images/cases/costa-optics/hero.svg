<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <pattern id="grid-co" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg-co" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <radialGradient id="glow-co" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#C4972A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg-co)"/>
  <rect width="1200" height="675" fill="url(#glow-co)"/>
  <rect width="1200" height="675" fill="url(#grid-co)"/>
  <!-- Decorative squares cluster -->
  <rect x="1020" y="80" width="80" height="80" fill="none" stroke="rgba(196,151,42,0.2)" stroke-width="1"/>
  <rect x="1060" y="80" width="80" height="80" fill="none" stroke="rgba(196,151,42,0.12)" stroke-width="1"/>
  <rect x="1060" y="120" width="40" height="40" fill="rgba(196,151,42,0.07)"/>
  <!-- Big metric -->
  <text x="80" y="330" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="140" fill="rgba(196,151,42,0.08)" letter-spacing="-6">100%</text>
  <!-- Text -->
  <text x="80" y="450" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="rgba(196,151,42,0.7)" letter-spacing="4">ÓPTICA · ECUADOR</text>
  <text x="80" y="520" font-family="Arial,sans-serif" font-weight="700" font-size="56" fill="white" letter-spacing="-2" opacity="0.9">Costa Optics</text>
  <text x="80" y="565" font-family="Arial,sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.45)">Modernización digital completa · Inventario 100% digital</text>
  <rect x="80" y="595" width="180" height="2" fill="#C4972A" opacity="0.5"/>
  <text x="1000" y="640" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="80" fill="rgba(255,255,255,0.03)" letter-spacing="-4">BIE</text>
</svg>