<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <pattern id="grid-ie" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg-ie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </linearGradient>
    <radialGradient id="glow-ie" cx="70%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#C4972A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg-ie)"/>
  <rect width="1200" height="675" fill="url(#glow-ie)"/>
  <rect width="1200" height="675" fill="url(#grid-ie)"/>
  <!-- Decorative squares -->
  <rect x="900" y="60" width="120" height="120" fill="none" stroke="rgba(196,151,42,0.2)" stroke-width="1"/>
  <rect x="920" y="80" width="80" height="80" fill="none" stroke="rgba(196,151,42,0.15)" stroke-width="1"/>
  <rect x="940" y="100" width="40" height="40" fill="rgba(196,151,42,0.08)"/>
  <!-- Bottom accent line -->
  <rect x="80" y="560" width="200" height="2" fill="#C4972A" opacity="0.6"/>
  <!-- Text -->
  <text x="80" y="420" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="rgba(196,151,42,0.7)" letter-spacing="4">REAL ESTATE · ECUADOR</text>
  <text x="80" y="490" font-family="Arial,sans-serif" font-weight="700" font-size="56" fill="white" letter-spacing="-2" opacity="0.9">Island Estates</text>
  <text x="80" y="540" font-family="Arial,sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.45)">Portal inmobiliario bilingüe · Chatbot calificador 24/7</text>
  <!-- BIE watermark -->
  <text x="980" y="640" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="80" fill="rgba(255,255,255,0.03)" letter-spacing="-4">BIE</text>
</svg>